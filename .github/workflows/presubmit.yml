name: presubmit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  format-code:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      pushed: ${{ steps.push.outputs.pushed }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format-20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc >/dev/null
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update -qq && sudo apt-get install -y -qq clang-format-20

      - name: Run clang-format on src/
        run: find src -name '*.cpp' -o -name '*.h' | xargs clang-format-20 -i

      - name: Commit and push if changed
        id: push
        run: |
          if git diff --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/
          git commit -m "style: auto-format with clang-format"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

  ci:
    needs: format-code
    if: >-
      always() &&
      (needs.format-code.result == 'skipped' ||
       (needs.format-code.result == 'success' && needs.format-code.outputs.pushed != 'true'))
    uses: ./.github/workflows/ci.yml

  all-checks-pass:
    needs: [format-code, ci]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: exit 1
        if: >-
          needs.ci.result != 'success' ||
          !(needs.format-code.result == 'success' || needs.format-code.result == 'skipped')
